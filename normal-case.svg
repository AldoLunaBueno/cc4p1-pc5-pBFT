<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" width="1000" height="350" >
    <style>
        text { fill: var(--text-color, #ffffff); font-family: sans-serif; }
        line, path { stroke: var(--line-color, #ffffff); }
        .marker-path { stroke: none !important; fill: var(--line-color, #ffffff) !important; }
    </style>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" class="marker-path" />
        </marker>
    </defs>

    <!-- Phase Labels -->
    <text x="145" y="40" font-family="serif" font-size="22" font-weight="bold" text-anchor="middle">request</text>
    <text x="310" y="40" font-family="serif" font-size="22" font-weight="bold" text-anchor="middle">pre-prepare</text>
    <text x="495" y="40" font-family="serif" font-size="22" font-weight="bold" text-anchor="middle">prepare</text>
    <text x="680" y="40" font-family="serif" font-size="22" font-weight="bold" text-anchor="middle">commit</text>
    <text x="860" y="40" font-family="serif" font-size="22" font-weight="bold" text-anchor="middle">reply</text>

    <!-- Node Labels -->
    <text x="25" y="66" font-family="serif" font-size="20" font-weight="bold" text-anchor="middle">C</text>
    <text x="25" y="126" font-family="serif" font-size="20" font-weight="bold" text-anchor="middle">0</text>
    <text x="25" y="186" font-family="serif" font-size="20" font-weight="bold" text-anchor="middle">1</text>
    <text x="25" y="246" font-family="serif" font-size="20" font-weight="bold" text-anchor="middle">2</text>
    <text x="25" y="306" font-family="serif" font-size="20" font-weight="bold" text-anchor="middle">3</text>

    <!-- Horizontal Lines for Nodes -->
    <line x1="40" y1="60" x2="980" y2="60"  stroke-width="2" />
    <line x1="40" y1="120" x2="980" y2="120"  stroke-width="2" />
    <line x1="40" y1="180" x2="980" y2="180"  stroke-width="2" />
    <line x1="40" y1="240" x2="980" y2="240"  stroke-width="2" />
    <line x1="40" y1="300" x2="980" y2="300"  stroke-width="2" />

    <!-- Vertical Dashed Lines -->
    <line x1="230" y1="20" x2="230" y2="330"  stroke-width="1.5" stroke-dasharray="5,5" />
    <line x1="390" y1="20" x2="390" y2="330"  stroke-width="1.5" stroke-dasharray="5,5" />
    <line x1="600" y1="20" x2="600" y2="330"  stroke-width="1.5" stroke-dasharray="5,5" />
    <line x1="760" y1="20" x2="760" y2="330"  stroke-width="1.5" stroke-dasharray="5,5" />

    <!-- Request Phase -->
    <line x1="50" y1="60" x2="220" y2="120"  stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- Pre-prepare Phase -->
    <line x1="240" y1="120" x2="380" y2="180"  stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="240" y1="120" x2="380" y2="240"  stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="240" y1="120" x2="380" y2="300"  stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- Prepare Phase -->
    <!-- Node 1 sends -->
    <line x1="400" y1="180" x2="590" y2="120"  stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="400" y1="180" x2="590" y2="240"  stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="400" y1="180" x2="590" y2="300"  stroke-width="1.5" marker-end="url(#arrow)" />
    <!-- Node 2 sends -->
    <line x1="400" y1="240" x2="590" y2="120"  stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="400" y1="240" x2="590" y2="180"  stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="400" y1="240" x2="590" y2="300"  stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- Commit Phase -->
    <!-- Node 0 sends -->
    <line x1="610" y1="120" x2="750" y2="180"  stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="610" y1="120" x2="750" y2="240"  stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="610" y1="120" x2="750" y2="300"  stroke-width="1.5" marker-end="url(#arrow)" />
    <!-- Node 1 sends -->
    <line x1="610" y1="180" x2="750" y2="120"  stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="610" y1="180" x2="750" y2="240"  stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="610" y1="180" x2="750" y2="300"  stroke-width="1.5" marker-end="url(#arrow)" />
    <!-- Node 2 sends -->
    <line x1="610" y1="240" x2="750" y2="120"  stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="610" y1="240" x2="750" y2="180"  stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="610" y1="240" x2="750" y2="300"  stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- Reply Phase -->
    <line x1="780" y1="120" x2="940" y2="60"  stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="780" y1="180" x2="960" y2="60"  stroke-width="1.5" marker-end="url(#arrow)" />
    <line x1="780" y1="240" x2="980" y2="60"  stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- X mark on Node 3 -->
    <path d="M 132 292 L 148 308 M 148 292 L 132 308"  stroke-width="4" stroke-linecap="round" fill="none" />
</svg>
