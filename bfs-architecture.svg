<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <marker id="arrow-start" markerWidth="3" markerHeight="3" refX="0.5" refY="1.5" orient="auto"><polygon points="3,0 0,1.5 3,3" class="marker-path" /></marker>
    <marker id="arrow-end" markerWidth="3" markerHeight="3" refX="2.5" refY="1.5" orient="auto"><polygon points="0,0 3,1.5 0,3" class="marker-path" /></marker>
  </defs>

  
  <style>
    .outer-box { fill: rgba(255, 255, 255, 0.05); stroke: var(--line-color, #ffffff); stroke-width: 3; }
    .inner-box { fill: none; stroke: var(--line-color, #ffffff); stroke-width: 2; }
    .outer-divider { stroke: var(--line-color, #ffffff); stroke-width: 3; }
    .inner-divider { stroke: var(--line-color, #ffffff); stroke-width: 2; }
    .arrow { stroke: var(--line-color, #ffffff); stroke-width: 3; fill: none; stroke-linejoin: miter; }
    .text-label { fill: var(--text-color, #ffffff); font-family: sans-serif; font-weight: bold; font-size: 20px; }
    .text-inner { fill: var(--text-color, #ffffff); font-family: sans-serif; font-size: 18px; text-anchor: middle; }
    .dots { fill: var(--line-color, #ffffff); }
    .marker-path { fill: var(--line-color, #ffffff); }
  </style>


  <text x="60" y="180" class="text-label" text-anchor="start">client</text>
  
  <rect x="50" y="190" width="400" height="250" rx="20" class="outer-box" />
  <line x1="50" y1="390" x2="450" y2="390" class="outer-divider" />
  <text x="250" y="423" class="text-inner">kernel NFS client</text>

  <rect x="80" y="235" width="150" height="110" rx="15" class="inner-box" />
  <text x="155" y="280" class="text-inner">Andrew</text>
  <text x="155" y="305" class="text-inner">benchmark</text>

  <rect x="270" y="235" width="150" height="110" rx="15" class="inner-box" />
  <line x1="270" y1="275" x2="420" y2="275" class="inner-divider" />
  <text x="345" y="261" class="text-inner">relay</text>
  <text x="345" y="300" class="text-inner">replication</text>
  <text x="345" y="325" class="text-inner">library</text>


  <text x="530" y="45" class="text-label" text-anchor="start">replica 0</text>
  
  <rect x="520" y="55" width="220" height="200" rx="20" class="outer-box" />
  <line x1="520" y1="205" x2="740" y2="205" class="outer-divider" />
  <text x="630" y="236" class="text-inner">kernel VM</text>

  <rect x="540" y="80" width="150" height="100" rx="15" class="inner-box" />
  <line x1="540" y1="120" x2="690" y2="120" class="inner-divider" />
  <text x="615" y="106" class="text-inner">snfsd</text>
  <text x="615" y="142" class="text-inner">replication</text>
  <text x="615" y="167" class="text-inner">library</text>


  <circle cx="630" cy="285" r="4" class="dots" />
  <circle cx="630" cy="302.5" r="4" class="dots" />
  <circle cx="630" cy="320" r="4" class="dots" />


  <text x="530" y="340" class="text-label" text-anchor="start">replica n</text>
  
  <rect x="520" y="350" width="220" height="200" rx="20" class="outer-box" />
  <line x1="520" y1="500" x2="740" y2="500" class="outer-divider" />
  <text x="630" y="531" class="text-inner">kernel VM</text>

  <rect x="540" y="375" width="150" height="100" rx="15" class="inner-box" />
  <line x1="540" y1="415" x2="690" y2="415" class="inner-divider" />
  <text x="615" y="401" class="text-inner">snfsd</text>
  <text x="615" y="437" class="text-inner">replication</text>
  <text x="615" y="462" class="text-inner">library</text>


  <line x1="155" y1="345" x2="155" y2="390" class="arrow" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)" />
  <line x1="345" y1="345" x2="345" y2="390" class="arrow" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)" />

  <line x1="420" y1="310" x2="540" y2="150" class="arrow" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)" />
  <line x1="420" y1="310" x2="540" y2="445" class="arrow" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)" />

  <polyline points="660,100 715,100 715,225" class="arrow" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)" />

  <polyline points="660,395 715,395 715,520" class="arrow" marker-start="url(#arrow-start)" marker-end="url(#arrow-end)" />

</svg>